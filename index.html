<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Project Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Cool Projects</h1>
    </header>

    <section class="introduction">
        <h2>About Me</h2>
        <p>Hello, I'm Vishal, a passionate web developer and data enthusiast...</p>
    </section>

    <!-- Project Cards Container -->
    <section class="band">
      <!-- Project cards will be inserted here by script.js -->
    </section>
    <!-- End Project Cards Container -->

    <!-- Scroll Down Indicator -->
    <div class="scroll-downs">
      <div class="mousey">
        <div class="scroller"></div>
      </div>
      <p>SCROLL DOWN</p>
    </div>
    <!-- End Scroll Down Indicator -->

   <footer>
    <p>2024 by Vishal.</p>
    <div class="social-media">
        <a href="your-linkedin-url" target="_blank">
            <img src="https://img.icons8.com/?size=50&id=61956&format=png>
        </a>
        <a href="your-github-url" target="_blank">
            <img src="https://www.flaticon.com/free-icon/github_1240971?term=github&page=1&position=14&origin=search&related_id=1240971" alt="GitHub">
        </a>
    </div>
</footer>

    
    <script src="script.js"></script>
</body>
</html>
