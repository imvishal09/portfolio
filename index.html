<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Project Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Cool Projects</h1>
    </header>

    <section class="introduction">
        <h2>About Me</h2>
        <p>Hello, I'm Vishal, a passionate web developer and data enthusiast...</p>
    </section>

    <div class="band"></div>

    <!-- Scroll Down Indicator -->
    <div class="scroll-downs">
      <p>SCROLL DOWN</p>
      <div class="mousey">
        <div class="scroller"></div>
      </div>
    </div>
    <!-- End Scroll Down Indicator -->

    <footer>
        <p>2024 by Vishal.</p>
        <div class="social-media">
            <a href="your-linkedin-url">LinkedIn</a>
            <a href="your-github-url">GitHub</a>
        </div>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
