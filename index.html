<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Projects</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="projects-container">
    <!-- Example of a project card -->
    <div class="card">
        <img class="card-image" src="https://via.placeholder.com/400" alt="Project Image">
        <div class="card-content">
            <h2 class="card-title">Project Title</h2>
            <p class="card-description">Short description of the project, such as technologies used or the goal of the project.</p>
            <a href="#" class="card-link">View Project</a>
        </div>
    </div>
    <!-- Repeat the above block for each project, with respective project details -->
</div>

</body>
</html>
